<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quantum Bias Stats</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      padding: 40px;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 30px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .card h2 {
      margin-bottom: 10px;
      color: #38bdf8;
    }

    .value {
      font-size: 36px;
      font-weight: bold;
    }

    .sessions {
      margin-top: 50px;
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    .session {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .win {
      border-left: 5px solid #22c55e;
    }

    .loss {
      border-left: 5px solid #ef4444;
    }

    .be {
      border-left: 5px solid #facc15;
    }

    .updated {
      margin-top: 30px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <h1>📊 Quantum Bias Stats</h1>

  <div class="stats">

    <div class="card">
      <h2>Wins</h2>
      <div class="value" id="wins">0</div>
    </div>

    <div class="card">
      <h2>Losses</h2>
      <div class="value" id="losses">0</div>
    </div>

    <div class="card">
      <h2>Break Even</h2>
      <div class="value" id="breakevens">0</div>
    </div>

    <div class="card">
      <h2>Total Sessions</h2>
      <div class="value" id="sessions">0</div>
    </div>

    <div class="card">
      <h2>Total Points</h2>
      <div class="value" id="points">0</div>
    </div>

    <div class="card">
      <h2>Win Rate</h2>
      <div class="value" id="winrate">0%</div>
    </div>

  </div>

  <div class="updated">
    Last Updated:
    <span id="updated">-</span>
  </div>

  <div class="sessions">
    <h2>Trading Sessions</h2>

    <div id="sessionsList"></div>
  </div>

  <script>

    const API = "https://qb-production-f306.up.railway.app/stats";

    async function loadStats() {

      try {

        const res = await fetch(API);
        const data = await res.json();

        // MAIN STATS
        document.getElementById("wins").innerText = data.wins;
        document.getElementById("losses").innerText = data.losses;
        document.getElementById("breakevens").innerText = data.breakevens;
        document.getElementById("sessions").innerText = data.totalSessions;
        document.getElementById("points").innerText = data.totalPoints;
        document.getElementById("winrate").innerText = data.winRate + "%";

        document.getElementById("updated").innerText =
          new Date(data.lastUpdated).toLocaleString();

        // SESSIONS
        const sessionsList = document.getElementById("sessionsList");

        sessionsList.innerHTML = "";

        data.sessions.reverse().forEach(session => {

          let className = "be";

          if (session.result === "WIN") className = "win";
          if (session.result === "LOSS") className = "loss";

          sessionsList.innerHTML += `
            <div class="session ${className}">
              <h3>${session.date} — ${session.result}</h3>

              <p><strong>Bias:</strong> ${session.bias}</p>

              <p><strong>Points:</strong> ${session.pts}</p>

              <p>${session.note}</p>
            </div>
          `;
        });

      } catch (err) {

        console.error(err);

      }
    }

    loadStats();

    setInterval(loadStats, 5000);

  </script>

</body>
</html>
