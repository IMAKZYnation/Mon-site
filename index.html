```html
<script>

const API = "https://qb-production-f306.up.railway.app/stats";

/* =========================
   PAGE NAVIGATION
========================= */

function showPage(page) {

  document
    .querySelectorAll(".page")
    .forEach(p => p.classList.remove("active"));

  const target =
    document.getElementById("page-" + page);

  if (target) {
    target.classList.add("active");
  }

  document
    .querySelectorAll(".nav-links a")
    .forEach(a => a.classList.remove("active"));

}

/* =========================
   CREATE RESULTS PAGE
========================= */

const resultsPage = document.createElement("div");

resultsPage.id = "page-results";
resultsPage.className = "page";

resultsPage.innerHTML = `
<section class="stats-section">
  <div class="stats-inner">

    <p class="section-tag">// Live Performance</p>

    <h2 class="section-title">
      Quantum Bias Results
    </h2>

    <p class="section-sub">
      Live statistics updated automatically from Telegram.
    </p>

    <div class="stats-grid">

      <div class="stat-card">
        <div class="stat-value" id="wins">0</div>
        <div class="stat-label">Wins</div>
      </div>

      <div class="stat-card">
        <div class="stat-value" id="losses">0</div>
        <div class="stat-label">Losses</div>
      </div>

      <div class="stat-card">
        <div class="stat-value" id="points">0</div>
        <div class="stat-label">NQ Points</div>
      </div>

      <div class="stat-card">
        <div class="stat-value" id="winrate">0%</div>
        <div class="stat-label">Win Rate</div>
      </div>

    </div>

    <div class="results-chart">

      <div class="chart-header">
        <div class="chart-title">
          Recent Sessions
        </div>

        <div class="chart-meta">
          AUTO UPDATED
        </div>
      </div>

      <table class="perf-table">

        <thead>
          <tr>
            <th>Date</th>
            <th>Bias</th>
            <th>Result</th>
            <th>Points</th>
          </tr>
        </thead>

        <tbody id="resultsTable">
        </tbody>

      </table>

    </div>

  </div>
</section>
`;

document.body.appendChild(resultsPage);

/* =========================
   LOAD LIVE STATS
========================= */

async function loadStats() {

  try {

    const res = await fetch(API);

    const data = await res.json();

    // STATS
    document.getElementById("wins").innerText =
      data.wins;

    document.getElementById("losses").innerText =
      data.losses;

    document.getElementById("points").innerText =
      data.totalPoints;

    document.getElementById("winrate").innerText =
      data.winRate + "%";

    // RESULTS TABLE
    const table =
      document.getElementById("resultsTable");

    table.innerHTML = "";

    data.sessions.forEach(session => {

      let badge = `
        <span class="badge-loss">
          ${session.result}
        </span>
      `;

      if (session.result === "WIN") {

        badge = `
          <span class="badge-win">
            WIN
          </span>
        `;
      }

      if (session.result === "PENDING") {
        return;
      }

      table.innerHTML += `
        <tr>
          <td>${session.date}</td>

          <td>${session.bias}</td>

          <td>${badge}</td>

          <td>${session.pts}</td>
        </tr>
      `;

    });

  } catch (err) {

    console.error(
      "Stats loading error:",
      err
    );

  }

}

/* =========================
   AUTO REFRESH
========================= */

loadStats();

setInterval(loadStats, 5000);

</script>
```
