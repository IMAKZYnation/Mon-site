<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Quantum Bias Stats</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      background: #0f172a;

      color: white;

      font-family: Arial, sans-serif;

      padding: 40px;

      text-align: center;

    }

    h1 {

      font-size: 42px;

      margin-bottom: 40px;

    }

    .stats {

      display: grid;

      grid-template-columns:
        repeat(auto-fit, minmax(220px, 1fr));

      gap: 20px;

      max-width: 1100px;

      margin: auto;

    }

    .card {

      background: #1e293b;

      padding: 25px;

      border-radius: 16px;

      box-shadow:
        0 0 10px rgba(0,0,0,0.3);

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;

    }

    .card:hover {

      transform: translateY(-5px);

      box-shadow:
        0 0 20px rgba(56,189,248,0.2);

    }

    .card h2 {

      margin-bottom: 12px;

      color: #38bdf8;

      font-size: 20px;

    }

    .value {

      font-size: 36px;

      font-weight: bold;

    }

    .updated {

      margin-top: 30px;

      color: #94a3b8;

      font-size: 14px;

    }

    .sessions {

      margin-top: 60px;

      max-width: 1000px;

      margin-left: auto;

      margin-right: auto;

      text-align: left;

    }

    .sessions h2 {

      margin-bottom: 25px;

      text-align: center;

    }

    .session {

      background: #1e293b;

      padding: 18px;

      border-radius: 12px;

      margin-bottom: 15px;

      transition:
        transform 0.2s ease;

    }

    .session:hover {

      transform: scale(1.01);

    }

    .session h3 {

      margin-bottom: 10px;

    }

    .session p {

      margin: 5px 0;

      color: #cbd5e1;

    }

    .win {

      border-left: 5px solid #22c55e;

    }

    .loss {

      border-left: 5px solid #ef4444;

    }

    .be {

      border-left: 5px solid #facc15;

    }

    .pending {

      border-left: 5px solid #38bdf8;

    }

    @media (max-width: 600px) {

      body {

        padding: 20px;

      }

      h1 {

        font-size: 30px;

      }

      .value {

        font-size: 28px;

      }

    }

  </style>

</head>

<body>

  <h1>⚛️ Quantum Bias Stats</h1>

  <div class="stats">

    <div class="card">
      <h2>Wins</h2>
      <div class="value" id="wins">0</div>
    </div>

    <div class="card">
      <h2>Losses</h2>
      <div class="value" id="losses">0</div>
    </div>

    <div class="card">
      <h2>Break Even</h2>
      <div class="value" id="breakevens">0</div>
    </div>

    <div class="card">
      <h2>Total Sessions</h2>
      <div class="value" id="sessions">0</div>
    </div>

    <div class="card">
      <h2>Total Points</h2>
      <div class="value" id="points">0</div>
    </div>

    <div class="card">
      <h2>Win Rate</h2>
      <div class="value" id="winrate">0%</div>
    </div>

  </div>

  <div class="updated">

    Last Updated:
    <span id="updated">-</span>

  </div>

  <div class="sessions">

    <h2>Trading Sessions</h2>

    <div id="sessionsList"></div>

  </div>

  <script>

    const API =
      "https://qb-production-f306.up.railway.app/stats";

    async function loadStats() {

      try {

        const res = await fetch(API);

        const data = await res.json();

        // MAIN STATS
        document.getElementById("wins")
          .innerText = data.wins;

        document.getElementById("losses")
          .innerText = data.losses;

        document.getElementById("breakevens")
          .innerText = data.breakevens;

        document.getElementById("sessions")
          .innerText = data.totalSessions;

        document.getElementById("points")
          .innerText = data.totalPoints;

        document.getElementById("winrate")
          .innerText = data.winRate + "%";

        document.getElementById("updated")
          .innerText =
            new Date(
              data.lastUpdated
            ).toLocaleString();

        // SESSION LIST
        const sessionsList =
          document.getElementById(
            "sessionsList"
          );

        sessionsList.innerHTML = "";

        // Clone to avoid reverse() mutation bug
        const sessions =
          [...data.sessions].reverse();

        sessions.forEach(session => {

          let className = "pending";

          if (session.result === "WIN")
            className = "win";

          if (session.result === "LOSS")
            className = "loss";

          if (session.result === "BE")
            className = "be";

          sessionsList.innerHTML += `

            <div class="session ${className}">

              <h3>
                ${session.date}
                — ${session.result}
              </h3>

              <p>
                <strong>Bias:</strong>
                ${session.bias}
              </p>

              <p>
                <strong>Points:</strong>
                ${session.pts}
              </p>

              <p>
                ${session.note}
              </p>

            </div>

          `;

        });

      } catch (err) {

        console.error(
          "Stats loading error:",
          err
        );

      }

    }

    // Initial load
    loadStats();

    // Auto refresh every 5s
    setInterval(loadStats, 5000);

  </script>

</body>
</html>
